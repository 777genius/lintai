name: Public Beta Release

on:
  push:
    tags:
      - "v*-beta.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing beta tag to publish or rerun"
        required: true
        default: "v0.1.0-beta.1"

concurrency:
  group: public-beta-release-${{ github.ref_name || inputs.release_tag }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release_context:
    name: Resolve Release Context
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_title: ${{ steps.resolve.outputs.release_title }}
      release_notes_path: ${{ steps.resolve.outputs.release_notes_path }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          case "$tag" in
            v*-beta.*) ;;
            *)
              echo "expected a beta tag like v0.1.0-beta.1, got: $tag" >&2
              exit 1
              ;;
          esac

          notes_path="docs/releases/${tag}.md"
          if [[ ! -f "$notes_path" ]]; then
            echo "missing checked-in release note: $notes_path" >&2
            exit 1
          fi

          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_title=lintai ${tag}" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=$notes_path" >> "$GITHUB_OUTPUT"

  verify_release_contracts:
    name: Verify Release Contracts
    needs: release_context
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - name: Verify checked-in case manifests stay canonical
        run: cargo run --manifest-path Cargo.toml --locked -p lintai-testing --bin normalize-case-manifests -- --check
      - name: Run CLI contract suites
        run: cargo test --manifest-path Cargo.toml --locked -p lintai-cli
      - name: Run security provider suites
        run: cargo test --manifest-path Cargo.toml --locked -p lintai-ai-security

  prepare_release_helpers:
    name: Prepare Release Helpers
    needs: release_context
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render Unix installer
        env:
          RELEASE_TAG: ${{ needs.release_context.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p dist
          sed \
            -e "s|__RELEASE_TAG__|${RELEASE_TAG}|g" \
            -e "s|__RELEASE_REPOSITORY__|${RELEASE_REPOSITORY}|g" \
            scripts/release/lintai-installer.sh > dist/lintai-installer.sh
          chmod +x dist/lintai-installer.sh
      - name: Render PowerShell installer
        shell: pwsh
        env:
          RELEASE_TAG: ${{ needs.release_context.outputs.release_tag }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          ((Get-Content "scripts/release/lintai-installer.ps1") `
            -replace "__RELEASE_TAG__", $env:RELEASE_TAG `
            -replace "__RELEASE_REPOSITORY__", $env:RELEASE_REPOSITORY) |
            Set-Content "dist/lintai-installer.ps1"
      - name: Upload release helpers
        uses: actions/upload-artifact@v4
        with:
          name: release-helpers
          path: |
            dist/lintai-installer.sh
            dist/lintai-installer.ps1

  build_assets:
    name: Build ${{ matrix.target }}
    needs:
      - release_context
      - verify_release_contracts
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: ${{ matrix.target == 'x86_64-unknown-linux-musl' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build release binary
        run: cargo build --manifest-path Cargo.toml --locked -p lintai-cli --release --target ${{ matrix.target }}
      - name: Package Unix asset
        if: ${{ matrix.archive_ext == 'tar.gz' }}
        shell: bash
        run: |
          tag="${{ needs.release_context.outputs.release_tag }}"
          asset_root="lintai-${tag}-${{ matrix.target }}"
          mkdir -p "dist/${asset_root}"
          cp "target/${{ matrix.target }}/release/lintai" "dist/${asset_root}/lintai"
          tar -C dist -czf "dist/${asset_root}.tar.gz" "${asset_root}"
      - name: Package Windows asset
        if: ${{ matrix.archive_ext == 'zip' }}
        shell: pwsh
        run: |
          $tag = "${{ needs.release_context.outputs.release_tag }}"
          $assetRoot = "lintai-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist/$assetRoot" -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/lintai.exe" "dist/$assetRoot/lintai.exe"
          Compress-Archive -Path "dist/$assetRoot" -DestinationPath "dist/$assetRoot.zip" -Force
      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.target }}
          path: dist/*

  smoke_installer_unix:
    name: Smoke installer (Unix)
    needs:
      - build_assets
      - prepare_release_helpers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: dist
      - name: Download release helpers
        uses: actions/download-artifact@v4
        with:
          name: release-helpers
          path: dist
      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > SHA256SUMS
          chmod +x lintai-installer.sh
      - name: Start local release server
        shell: bash
        run: |
          cd dist
          python3 -m http.server 18080 >/tmp/lintai-release-http.log 2>&1 &
          echo $! > /tmp/lintai-release-http.pid
          sleep 2
      - name: Run Unix installer smoke
        shell: bash
        env:
          LINTAI_INSTALL_BASE_URL: http://127.0.0.1:18080
        run: |
          INSTALL_DIR="$RUNNER_TEMP/lintai-bin"
          sh dist/lintai-installer.sh --install-dir "$INSTALL_DIR" --target x86_64-unknown-linux-gnu
          "$INSTALL_DIR/lintai" help >/dev/null
      - name: Stop local release server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/lintai-release-http.pid ]; then
            kill "$(cat /tmp/lintai-release-http.pid)" || true
          fi

  smoke_installer_windows:
    name: Smoke installer (Windows)
    needs:
      - build_assets
      - prepare_release_helpers
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: dist
      - name: Download release helpers
        uses: actions/download-artifact@v4
        with:
          name: release-helpers
          path: dist
      - name: Generate checksums
        shell: pwsh
        run: |
          $archives = Get-ChildItem dist | Where-Object { $_.Name -like "*.tar.gz" -or $_.Name -like "*.zip" } | Sort-Object Name
          $lines = foreach ($file in $archives) {
            "$((Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLowerInvariant())  $($file.Name)"
          }
          Set-Content -Path "dist/SHA256SUMS" -Value $lines
      - name: Start local release server
        shell: pwsh
        run: |
          $job = Start-Job -ScriptBlock {
            param($path)
            Set-Location $path
            py -3 -m http.server 18081
          } -ArgumentList (Join-Path $pwd "dist")
          Set-Content -Path "$env:RUNNER_TEMP\lintai-http-job.txt" -Value $job.Id
          Start-Sleep -Seconds 2
      - name: Run Windows installer smoke
        shell: pwsh
        env:
          LINTAI_INSTALL_BASE_URL: http://127.0.0.1:18081
        run: |
          $installDir = Join-Path $env:RUNNER_TEMP "lintai-bin"
          powershell -ExecutionPolicy Bypass -File .\dist\lintai-installer.ps1 -InstallDir $installDir -Target x86_64-pc-windows-msvc
          & (Join-Path $installDir "lintai.exe") help | Out-Null
      - name: Stop local release server
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "$env:RUNNER_TEMP\lintai-http-job.txt") {
            $jobId = Get-Content "$env:RUNNER_TEMP\lintai-http-job.txt"
            Stop-Job -Id $jobId -ErrorAction SilentlyContinue
            Remove-Job -Id $jobId -Force -ErrorAction SilentlyContinue
          }

  publish_release:
    name: Publish GitHub Release
    needs:
      - release_context
      - build_assets
      - prepare_release_helpers
      - smoke_installer_unix
      - smoke_installer_windows
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-asset-*
          merge-multiple: true
          path: dist
      - name: Download release helpers
        uses: actions/download-artifact@v4
        with:
          name: release-helpers
          path: dist
      - name: Install Cargo CycloneDX
        shell: bash
        run: cargo install --locked cargo-cyclonedx --version 0.5.9
      - name: Generate SBOM bundle
        shell: bash
        run: |
          tag="${{ needs.release_context.outputs.release_tag }}"
          bundle_root="lintai-${tag}-sbom"
          rm -rf "dist/${bundle_root}"
          cargo cyclonedx --manifest-path Cargo.toml --format json
          mkdir -p "dist/${bundle_root}"
          while IFS= read -r bom; do
            rel="${bom#./}"
            cp "$bom" "dist/${bundle_root}/${rel//\//__}"
          done < <(find . -path './target' -prune -o -name bom.json -print | sort)
          if [[ -z "$(find "dist/${bundle_root}" -maxdepth 1 -type f -print -quit)" ]]; then
            echo "no CycloneDX SBOM files were generated" >&2
            exit 1
          fi
          tar -C dist -czf "dist/${bundle_root}.tar.gz" "${bundle_root}"
      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          shopt -s nullglob
          files=( *.tar.gz *.zip lintai-installer.sh lintai-installer.ps1 )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "no packaged release assets found" >&2
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
      - name: Attest release assets
        id: attest_release_assets
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/lintai-installer.sh
            dist/lintai-installer.ps1
            dist/SHA256SUMS
      - name: Save provenance bundle
        shell: bash
        run: |
          tag="${{ needs.release_context.outputs.release_tag }}"
          cp "${{ steps.attest_release_assets.outputs.bundle-path }}" \
            "dist/lintai-${tag}-provenance.intoto.jsonl"
      - name: Verify release asset bundle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ needs.release_context.outputs.release_tag }}"
          scripts/release/verify-release-assets.sh \
            --release-dir dist \
            --repo "${{ github.repository }}" \
            --bundle "dist/lintai-${tag}-provenance.intoto.jsonl"
      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release_context.outputs.release_tag }}
          name: ${{ needs.release_context.outputs.release_title }}
          body_path: ${{ needs.release_context.outputs.release_notes_path }}
          prerelease: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/lintai-installer.sh
            dist/lintai-installer.ps1
            dist/SHA256SUMS
            dist/*-sbom.tar.gz
            dist/*-provenance.intoto.jsonl
