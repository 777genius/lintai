name: Cross Platform Smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native_smoke:
    name: Native Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          profile: minimal
      - uses: Swatinem/rust-cache@v2
      - name: Build lintai CLI
        run: cargo build --manifest-path Cargo.toml --locked -p lintai-cli
      - name: Run help
        run: cargo run --manifest-path Cargo.toml --locked -p lintai-cli -- help
      - name: Run config-schema
        run: cargo run --manifest-path Cargo.toml --locked -p lintai-cli -- config-schema

  musl_smoke:
    name: Linux musl Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          profile: minimal
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl
      - name: Build musl release binary
        run: cargo build --manifest-path Cargo.toml --locked -p lintai-cli --release --target x86_64-unknown-linux-musl

  smoke_gate:
    name: Smoke Gate
    if: ${{ always() }}
    needs:
      - native_smoke
      - musl_smoke
    runs-on: ubuntu-latest
    steps:
      - name: Verify smoke jobs succeeded
        shell: bash
        run: |
          test "${{ needs.native_smoke.result }}" = "success"
          test "${{ needs.musl_smoke.result }}" = "success"
