name: Docs Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Install docs dependencies
        run: npm ci
      - name: Verify checked-in case manifests stay canonical
        run: npm run fixtures:check
      - name: Validate docs contracts
        run: |
          cargo test -q -p lintai-cli site_catalog -- --nocapture
          cargo test -q -p lintai-cli --test docs_contract -- --nocapture
      - name: Build VitePress docs for GitHub Pages
        env:
          LINTAI_DOCS_BASE: /lintai/
        run: |
          npm run docs:build
          touch docs/.vitepress/dist/.nojekyll
      - name: Upload Pages artifact
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy Docs Site
    if: ${{ github.event_name != 'pull_request' }}
    needs:
      - build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
