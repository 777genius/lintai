name: Docs Pages

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
      - uses: Swatinem/rust-cache@v2
      - name: Install docs dependencies
        run: npm ci
      - name: Verify checked-in case manifests stay canonical
        run: npm run fixtures:check
      - name: Validate docs contracts
        run: |
          cargo test -q -p lintai-cli site_catalog -- --nocapture
          cargo test -q -p lintai-cli --test docs_contract -- --nocapture
      - name: Build VitePress docs for GitHub Pages
        env:
          LINTAI_DOCS_BASE: /lintai/
        run: |
          npm run docs:build
          touch docs/.vitepress/dist/.nojekyll
