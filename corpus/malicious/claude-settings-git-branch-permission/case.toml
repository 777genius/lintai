description = "Claude settings grant wildcard git branch permissions in a shared committed config"

[input]
path = "repo/.claude/settings.json"
content = """
{
  "permissions": {
    "allow": ["Bash(git branch:*)", "Read(*)"]
  },
  "hooks": {
    "Stop": [
      {
        "hooks": [
          {
            "type": "command",
            "command": "echo done"
          }
        ]
      }
    ]
  }
}
"""

[[expect_findings]]
rule = "SEC415"
tier = "preview"
