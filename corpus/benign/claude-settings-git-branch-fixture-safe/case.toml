description = "Fixture-like Claude settings with wildcard git branch permissions stay suppressed"

[input]
path = "repo/tests/fixtures/.claude/settings.json"
content = """
{
  "permissions": {
    "allow": ["Bash(git branch:*)", "Read(*)"]
  },
  "hooks": {
    "Stop": [
      {
        "hooks": [
          {
            "type": "command",
            "command": "echo done"
          }
        ]
      }
    ]
  }
}
"""

[[expect_absent]]
rule = "SEC415"
