description = "Specific git branch command in Claude settings stays clean"

[input]
path = "repo/.claude/settings.json"
content = """
{
  "permissions": {
    "allow": ["Bash(git branch feature/test)", "Read(*)"]
  },
  "hooks": {
    "Stop": [
      {
        "hooks": [
          {
            "type": "command",
            "command": "echo done"
          }
        ]
      }
    ]
  }
}
"""

[[expect_absent]]
rule = "SEC415"
